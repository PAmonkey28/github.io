<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四年級自然科學學習遊戲</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Microsoft JhengHei','Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .container{max-width:1000px;width:100%}
        .home-screen{text-align:center;animation:fadeIn .6s ease-in}
        .home-screen h1{color:white;font-size:2.5em;margin-bottom:20px;text-shadow:3px 3px 6px rgba(0,0,0,.3)}
        .home-screen p{color:rgba(255,255,255,.9);font-size:1.1em;margin-bottom:40px}
        .game-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:30px}
        .game-card{background:white;border-radius:15px;padding:25px;cursor:pointer;transition:all .3s;box-shadow:0 10px 30px rgba(0,0,0,.2)}
        .game-card:hover{transform:translateY(-8px);box-shadow:0 15px 40px rgba(0,0,0,.3)}
        .game-card h3{color:#667eea;font-size:1.4em;margin-bottom:10px}
        .unit-label{display:inline-block;background:#667eea;color:white;padding:5px 15px;border-radius:20px;font-size:.85em;margin-bottom:15px}
        .game-card p{color:#666;font-size:.95em;line-height:1.6;margin-bottom:15px}
        .play-btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;padding:12px 30px;border-radius:25px;font-size:1em;cursor:pointer;font-weight:bold;transition:all .3s}
        .play-btn:hover{transform:scale(1.05)}
        
        .game-screen{background:white;border-radius:15px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:fadeIn .5s;display:none}
        .game-screen.active{display:block}
        .game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;padding-bottom:15px;border-bottom:3px solid #f0f0f0}
        .game-header h2{color:#667eea;font-size:1.6em}
        .back-btn{background:#f0f0f0;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;font-size:.9em;transition:all .3s}
        .back-btn:hover{background:#667eea;color:white}
        
        .game1-content{text-align:center}
        .organism-image{width:120px;height:120px;margin:20px auto;font-size:70px;display:flex;align-items:center;justify-content:center;background:#f5f5f5;border-radius:12px}
        .question-text{color:#333;font-size:1.2em;margin-bottom:25px;font-weight:bold}
        .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
        .option-btn{padding:15px;border:3px solid #e0e0e0;background:white;border-radius:12px;cursor:pointer;font-size:1em;transition:all .3s;font-weight:bold}
        .option-btn:hover{border-color:#667eea;background:#f0f5ff}
        .option-btn.correct{background:#4caf50;color:white;border-color:#4caf50}
        .option-btn.incorrect{background:#f44336;color:white;border-color:#f44336}
        
        .feedback{margin:15px 0;padding:12px;border-radius:8px;font-size:1em;font-weight:bold;min-height:25px}
        .feedback.correct{background:#c8e6c9;color:#2e7d32}
        .feedback.incorrect{background:#ffcdd2;color:#c62828}
        .score-display{background:#667eea;color:white;padding:10px 25px;border-radius:20px;font-size:1em;font-weight:bold;display:inline-block}
        
        .game2-content{text-align:center}
        .environment-showcase{background:linear-gradient(180deg,#87ceeb 0%,#4a90e2 100%);border-radius:12px;padding:25px;margin:15px 0;min-height:150px;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .creature{font-size:50px;animation:float 3s ease-in-out infinite}
        .adaptation-card{background:#f0f0f0;padding:12px;border-radius:8px;margin:8px 0;text-align:left;border-left:4px solid #667eea}
        .adaptation-card strong{color:#667eea}
        
        .game3-content{text-align:center}
        .sound-wave{display:flex;justify-content:center;gap:4px;margin:20px 0;height:80px;align-items:center}
        .wave-bar{width:6px;background:#667eea;border-radius:3px;animation:soundWave .6s ease-in-out infinite}
        .wave-bar:nth-child(1){animation-delay:0s;height:15px}
        .wave-bar:nth-child(2){animation-delay:.1s;height:40px}
        .wave-bar:nth-child(3){animation-delay:.2s;height:60px}
        .wave-bar:nth-child(4){animation-delay:.3s;height:40px}
        .wave-bar:nth-child(5){animation-delay:.4s;height:15px}
        
        .light-spectrum{display:flex;gap:2px;margin:20px 0;height:40px;border-radius:8px;overflow:hidden}
        .spectrum-color{flex:1;animation:glow 2s ease-in-out infinite}
        .spectrum-color:nth-child(1){background:#ff0000}
        .spectrum-color:nth-child(2){background:#ff7f00}
        .spectrum-color:nth-child(3){background:#ffff00}
        .spectrum-color:nth-child(4){background:#00ff00}
        .spectrum-color:nth-child(5){background:#0000ff}
        .spectrum-color:nth-child(6){background:#4b0082}
        .spectrum-color:nth-child(7){background:#9400d3}
        
        .result-screen{text-align:center;animation:fadeIn .5s;display:none}
        .result-screen.active{display:block}
        .result-icon{font-size:80px;margin:15px 0;animation:bounce .8s ease}
        .result-screen h3{color:#333;font-size:1.8em;margin-bottom:15px}
        .result-screen p{color:#666;font-size:1.1em;margin-bottom:25px}
        .btn-group{display:flex;gap:15px;justify-content:center}
        .btn-primary,.btn-secondary{padding:12px 35px;border:none;border-radius:20px;font-size:1em;cursor:pointer;font-weight:bold;transition:all .3s}
        .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
        .btn-secondary{background:#f0f0f0;color:#333}
        .btn-primary:hover,.btn-secondary:hover{transform:translateY(-2px);box-shadow:0 8px 15px rgba(0,0,0,.1)}
        
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
        @keyframes soundWave{0%,100%{height:15px}50%{height:60px}}
        @keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
        
        @media(max-width:768px){
            .home-screen h1{font-size:1.8em}
            .game-screen{padding:20px}
            .options-grid{grid-template-columns:1fr}
            .game-grid{grid-template-columns:1fr}
            .organism-image{width:100px;height:100px;font-size:60px}
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首頁 -->
        <div id="homeScreen" class="home-screen">
            <h1>🎮 自然科學學習遊戲</h1>
            <p>選擇你要玩的遊戲，挑戰自己的學習!</p>
            
            <div class="game-grid">
                <div class="game-card">
                    <div class="unit-label">第一單元</div>
                    <h3>🦋 生物分類</h3>
                    <p>認識不同的生物，練習分類！</p>
                    <button class="play-btn" onclick="startGame(1)">開始遊戲</button>
                </div>

                <div class="game-card">
                    <div class="unit-label">第二單元</div>
                    <h3>🐠 水生生物</h3>
                    <p>探索水生生物的適應方式！</p>
                    <button class="play-btn" onclick="startGame(2)">開始遊戲</button>
                </div>

                <div class="game-card">
                    <div class="unit-label">第三單元</div>
                    <h3>🔊 聲光現象</h3>
                    <p>認識聲音和光的特性！</p>
                    <button class="play-btn" onclick="startGame(3)">開始遊戲</button>
                </div>
            </div>
        </div>

        <!-- 遊戲1 -->
        <div id="game1Screen" class="game-screen">
            <div class="game-header">
                <h2>🦋 生物分類遊戲</h2>
                <div>
                    <span class="score-display">分數: <span id="game1Score">0</span>/10</span>
                    <button class="back-btn" onclick="backHome()">返回</button>
                </div>
            </div>
            <div class="game1-content">
                <div class="organism-image" id="game1Emoji"></div>
                <p class="question-text" id="game1Question"></p>
                <div class="options-grid" id="game1Options"></div>
                <div class="feedback" id="game1Feedback"></div>
                <button class="play-btn" id="game1NextBtn" onclick="nextQuestion1()" style="display:none;">下一題</button>
            </div>
        </div>

        <!-- 遊戲2 -->
        <div id="game2Screen" class="game-screen">
            <div class="game-header">
                <h2>🐠 水生生物適應</h2>
                <div>
                    <span class="score-display">進度: <span id="game2Progress">1</span>/5</span>
                    <button class="back-btn" onclick="backHome()">返回</button>
                </div>
            </div>
            <div class="game2-content">
                <p class="question-text" id="game2Question"></p>
                <div class="environment-showcase" id="game2Environment">
                    <div class="creature" id="game2Creature"></div>
                </div>
                <div id="game2Adaptations"></div>
                <div class="feedback" id="game2Feedback"></div>
                <button class="play-btn" id="game2NextBtn" onclick="nextQuestion2()" style="display:none;">下一個</button>
            </div>
        </div>

        <!-- 遊戲3 -->
        <div id="game3Screen" class="game-screen">
            <div class="game-header">
                <h2>🔊 聲光現象</h2>
                <div>
                    <span class="score-display">進度: <span id="game3Progress">1</span>/4</span>
                    <button class="back-btn" onclick="backHome()">返回</button>
                </div>
            </div>
            <div class="game3-content">
                <p class="question-text" id="game3Question"></p>
                <div id="game3Content"></div>
                <div class="feedback" id="game3Feedback"></div>
                <button class="play-btn" id="game3NextBtn" onclick="nextQuestion3()" style="display:none;">下一題</button>
            </div>
        </div>

        <!-- 結果 -->
        <div id="resultScreen" class="result-screen">
            <div class="result-icon" id="resultIcon"></div>
            <h3 id="resultTitle"></h3>
            <p id="resultMessage"></p>
            <div class="btn-group">
                <button class="btn-primary" onclick="backHome()">返回首頁</button>
                <button class="btn-secondary" id="retryBtn">重新挑戰</button>
            </div>
        </div>
    </div>

    <script>
        const game1Data=[
            {emoji:'🦋',q:'蝴蝶是什麼生物？',opt:['昆蟲','鳥類','哺乳動物','爬蟲類'],c:0},
            {emoji:'🐠',q:'金魚屬於？',opt:['爬蟲類','魚類','兩棲類','哺乳動物'],c:1},
            {emoji:'🦆',q:'鴨子是？',opt:['魚類','爬蟲類','鳥類','昆蟲'],c:2},
            {emoji:'🐸',q:'青蛙屬於？',opt:['昆蟲','兩棲類','爬蟲類','魚類'],c:1},
            {emoji:'🐢',q:'烏龜是？',opt:['兩棲類','昆蟲','爬蟲類','魚類'],c:2},
            {emoji:'🦗',q:'蟋蟀是？',opt:['魚類','鳥類','昆蟲','兩棲類'],c:2},
            {emoji:'🦅',q:'老鷹是？',opt:['哺乳動物','爬蟲類','鳥類','兩棲類'],c:2},
            {emoji:'🐰',q:'兔子是？',opt:['爬蟲類','哺乳動物','鳥類','兩棲類'],c:1},
            {emoji:'🐹',q:'倉鼠是？',opt:['昆蟲','爬蟲類','哺乳動物','兩棲類'],c:2},
            {emoji:'🦎',q:'蜥蜴是？',opt:['兩棲類','哺乳動物','爬蟲類','魚類'],c:2}
        ];
        let g1i=0,g1s=0,g1a=false;

        const game2Data=[
            {c:'🐠',n:'金魚',a:'身體流線形減少阻力\n有鰓吸收氧氣\n有鰭幫助游泳'},
            {c:'🦐',n:'蝦子',a:'身體透明躲避敵人\n有硬殼保護身體\n能在泥土中挖洞'},
            {c:'🦀',n:'螃蟹',a:'強壯的鉗子防禦\n眼睛長在觸角上\n橫著走躲在岩石下'},
            {c:'🐌',n:'螺貝類',a:'堅硬貝殼保護身體\n能吸附在岩石上\n用吸盤找食物'},
            {c:'🦑',n:'章魚',a:'身體柔軟進入狹窄空間\n能改變顏色隱藏\n有吸盤抓住東西'}
        ];
        let g2i=0;

        const game3Data=[
            {t:'sound',q:'聲音如何傳播？',c:'<p style="margin:15px 0">👇 聲波振動傳播 👇</p><div class="sound-wave"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div><p style="color:#666">聲音以波浪形式通過空氣傳播。</p>'},
            {t:'light',q:'光有哪些顏色？',c:'<p style="margin:15px 0">👇 彩虹的七種顏色 👇</p><div class="light-spectrum"><div class="spectrum-color"></div><div class="spectrum-color"></div><div class="spectrum-color"></div><div class="spectrum-color"></div><div class="spectrum-color"></div><div class="spectrum-color"></div><div class="spectrum-color"></div></div><p style="color:#666">紅、橙、黃、綠、藍、靛、紫七種顏色。</p>'},
            {t:'sound',q:'聲音有什麼特性？',c:'<div style="margin:15px 0"><div class="adaptation-card"><strong>📢 音量高低</strong> 可以大聲或輕聲</div><div class="adaptation-card"><strong>🎵 音色不同</strong> 不同物體發出不同聲音</div><div class="adaptation-card"><strong>🔊 音速</strong> 聲音有傳播速度</div></div>'},
            {t:'light',q:'光有什麼用途？',c:'<div style="margin:15px 0"><div class="adaptation-card"><strong>💡 照明</strong> 幫助我們看清楚</div><div class="adaptation-card"><strong>🌡️ 加熱</strong> 讓物體變暖</div><div class="adaptation-card"><strong>🔬 應用</strong> 用在放大鏡、眼鏡中</div></div>'}
        ];
        let g3i=0;

        function initGame1(){g1i=0;g1s=0;g1a=false;loadG1();}
        function loadG1(){const q=game1Data[g1i];document.getElementById('game1Emoji').textContent=q.emoji;document.getElementById('game1Question').textContent=q.q;const d=document.getElementById('game1Options');d.innerHTML='';q.opt.forEach((o,i)=>{const b=document.createElement('button');b.className='option-btn';b.textContent=o;b.onclick=()=>selectG1(i);d.appendChild(b)});document.getElementById('game1Feedback').textContent='';document.getElementById('game1NextBtn').style.display='none';g1a=false;}
        function selectG1(i){if(g1a)return;g1a=true;const q=game1Data[g1i];const bs=document.querySelectorAll('#game1Options .option-btn');bs.forEach((b,idx)=>{if(idx===q.c)b.classList.add('correct');else if(idx===i)b.classList.add('incorrect');b.disabled=true});const f=document.getElementById('game1Feedback');if(i===q.c){f.className='feedback correct';f.textContent='✓ 正確!';g1s++}else{f.className='feedback incorrect';f.textContent='✗ 錯誤，答案是：'+q.opt[q.c]}document.getElementById('game1Score').textContent=g1s;if(g1i<game1Data.length-1)document.getElementById('game1NextBtn').style.display='block';else setTimeout(()=>endG1(),1200);}
        function nextQuestion1(){g1i++;if(g1i<game1Data.length)loadG1();else endG1();}
        function endG1(){showResult(g1s>=7?'🎉 太棒了!':'💪 再加油!',g1s>=7?'生物分類表現很好!':'多練習就能進步!',g1s+'/10',()=>initGame1());}

        function initGame2(){g2i=0;loadG2();}
        function loadG2(){const c=game2Data[g2i];document.getElementById('game2Question').textContent='認識 '+c.n+' 的生存適應！';document.getElementById('game2Creature').textContent=c.c;document.getElementById('game2Progress').textContent=g2i+1;const a=document.getElementById('game2Adaptations');a.innerHTML='<p style="color:#333;font-weight:bold;margin:10px 0">👇 這種生物的適應方式 👇</p>';c.a.split('\n').forEach(ad=>{const cd=document.createElement('div');cd.className='adaptation-card';cd.innerHTML='<strong>✓ '+ad+'</strong>';a.appendChild(cd)});document.getElementById('game2Feedback').textContent='';document.getElementById('game2NextBtn').style.display=g2i<game2Data.length-1?'block':'none';}
        function nextQuestion2(){g2i++;if(g2i<game2Data.length)loadG2();else showResult('🌊 完美!','了解了5種水生生物的適應方式!','5/5',()=>initGame2());}

        function initGame3(){g3i=0;loadG3();}
        function loadG3(){const d=game3Data[g3i];document.getElementById('game3Question').textContent=d.q;document.getElementById('game3Content').innerHTML=d.c;document.getElementById('game3Progress').textContent=g3i+1;document.getElementById('game3Feedback').textContent='';document.getElementById('game3NextBtn').style.display='block';}
        function nextQuestion3(){g3i++;if(g3i<game3Data.length)loadG3();else showResult('🔆 完成!','對聲光現象有深入理解!','4/4',()=>initGame3());}

        function startGame(n){document.getElementById('homeScreen').style.display='none';document.getElementById('resultScreen').classList.remove('active');if(n===1){document.getElementById('game1Screen').classList.add('active');initGame1()}else if(n===2){document.getElementById('game2Screen').classList.add('active');initGame2()}else{document.getElementById('game3Screen').classList.add('active');initGame3()}}
        function backHome(){document.getElementById('homeScreen').style.display='block';document.getElementById('game1Screen').classList.remove('active');document.getElementById('game2Screen').classList.remove('active');document.getElementById('game3Screen').classList.remove('active');document.getElementById('resultScreen').classList.remove('active')}
        function showResult(t,m,s,r){document.getElementById('game1Screen').classList.remove('active');document.getElementById('game2Screen').classList.remove('active');document.getElementById('game3Screen').classList.remove('active');document.getElementById('resultIcon').textContent=t.split(' ')[0];document.getElementById('resultTitle').textContent=t;document.getElementById('resultMessage').textContent=m+' ('+s+')';document.getElementById('retryBtn').onclick=r;document.getElementById('resultScreen').classList.add('active')}
        window.addEventListener('load',()=>{document.getElementById('homeScreen').style.display='block'});
    </script>
</body>
</html>
